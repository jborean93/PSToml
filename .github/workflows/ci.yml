name: Test PSToml
on:
  push:
    branches:
    - main

  pull_request:
    branches:
    - main

  release:
    types:
    - published

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  POWERSHELL_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  BUILD_CONFIGURATION: ${{ fromJSON('["Debug", "Release"]')[github.ref == 'refs/heads/main' || startsWith(github.event.release.tag_name, 'v')] }}

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Azure OIDC auth
      contents: read  # Repo checkout

    steps:
    - name: Check out repository
      uses: actions/checkout@v6

    - name: OIDC Login to Azure - Release only
      if: startsWith(github.event.release.tag_name, 'v')
      shell: pwsh
      run: |
        $loginParams = @{
            ClientId = '${{ secrets.AZURE_CLIENT_ID }}'
            TenantId = '${{ secrets.AZURE_TENANT_ID }}'
            SubscriptionId = '${{ secrets.AZURE_SUBSCRIPTION_ID }}'
        }
        ./tools/AzLoginOIDC.ps1 @loginParams

    - name: Build module
      shell: pwsh
      run: ./build.ps1 -Configuration $env:BUILD_CONFIGURATION -Task Build
      env:
        AZURE_TS_NAME: ${{ startsWith(github.event.release.tag_name, 'v') && secrets.AZURE_TS_NAME || '' }}
        AZURE_TS_PROFILE: ${{ startsWith(github.event.release.tag_name, 'v') && secrets.AZURE_TS_PROFILE || '' }}
        AZURE_TS_ENDPOINT: ${{ startsWith(github.event.release.tag_name, 'v') && secrets.AZURE_TS_ENDPOINT || '' }}

    - name: Capture PowerShell Module
      uses: actions/upload-artifact@v7
      with:
        name: PSModule
        path: output/*.nupkg

  test:
    name: test
    needs:
    - build
    runs-on: ${{ matrix.info.os }}
    strategy:
      fail-fast: false
      matrix:
        info:
        - name: PS_5.1_x64_Windows
          psversion: '5.1'
          os: windows-latest
        - name: PS_7.4_x64_Windows
          psversion: '7.4.0'
          os: windows-latest
        - name: PS_7.4_x64_Linux
          psversion: '7.4.0'
          os: ubuntu-latest
        - name: PS_7.5_x64_Windows
          psversion: '7.5.0'
          os: windows-latest
        - name: PS_7.5_x64_Linux
          psversion: '7.5.0'
          os: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    # Seems to be needed for macOS to run coverlet
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore Built PowerShell Module
      uses: actions/download-artifact@v8
      with:
        name: PSModule
        path: output

    - name: Run Tests
      shell: pwsh
      run: |
        $buildParams = @{
            Configuration = $env:BUILD_CONFIGURATION
            Task = 'Test'
            PowerShellVersion = '${{ matrix.info.psversion }}'
            ModuleNupkg = 'output/*.nupkg'
        }
        ./build.ps1 @buildParams
        exit $LASTEXITCODE

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: Unit Test Results (${{ matrix.info.name }})
        path: ./output/TestResults/Pester.xml

    - name: Upload Coverage Results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: Coverage Results (${{ matrix.info.name }})
        path: ./output/TestResults/Coverage.xml

    - name: Upload Coverage to codecov
      if: always()
      uses: codecov/codecov-action@v6
      with:
        files: ./output/TestResults/Coverage.xml
        flags: ${{ matrix.info.name }}
        token: ${{ secrets.CODECOV_TOKEN }}

  publish:
    name: publish
    needs:
    - test
    if: startsWith(github.event.release.tag_name, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed for GitHub release asset task

    steps:
    - name: Restore Built PowerShell Module
      uses: actions/download-artifact@v8
      with:
        name: PSModule
        path: ./

    - name: Upload to release asset
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release upload \
          "${{ github.event.release.tag_name }}" \
          *.nupkg \
          --repo "${{ github.repository }}"

    - name: Publish to the PowerShell Gallery
      run: >-
        dotnet nuget push *.nupkg
        --api-key "${PSGALLERY_TOKEN}"
        --source "https://www.powershellgallery.com/api/v2/package"
        --no-symbols
      env:
        PSGALLERY_TOKEN: ${{ secrets.PSGALLERY_TOKEN }}
